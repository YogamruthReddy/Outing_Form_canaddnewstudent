<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Outing Portal | Woxsen University</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter',sans-serif;
      background:#060714;
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      color:#f1f5f9;overflow:hidden;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;
      background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(99,102,241,.18) 0%,transparent 60%),
                 radial-gradient(ellipse 60% 40% at 80% 10%,rgba(167,139,250,.12) 0%,transparent 60%),
                 radial-gradient(ellipse 50% 60% at 50% 100%,rgba(56,189,248,.10) 0%,transparent 60%);
    }
    .card{
      position:relative;z-index:1;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(24px);
      border-radius:24px;
      padding:56px 48px;
      text-align:center;
      max-width:480px;width:90%;
      box-shadow:0 24px 60px rgba(0,0,0,.5),0 0 40px rgba(99,102,241,.12);
      animation:slideUp .7s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .icon-ring{
      width:80px;height:80px;border-radius:50%;
      background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 28px;font-size:2rem;color:#a78bfa;
      animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(99,102,241,.4)}50%{box-shadow:0 0 0 16px rgba(99,102,241,0)}}
    h1{font-size:1.6rem;font-weight:700;margin-bottom:12px;
       background:linear-gradient(135deg,#f1f5f9,#a78bfa);
       -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    p{color:#94a3b8;font-size:.95rem;line-height:1.6;margin-bottom:32px;}
    .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:36px;}
    .chip{
      display:flex;align-items:center;gap:7px;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
      border-radius:999px;padding:6px 14px;font-size:.78rem;color:#94a3b8;
    }
    .chip i{color:#10b981;font-size:.7rem;}
    .retry-btn{
      display:inline-flex;align-items:center;gap:8px;
      background:linear-gradient(135deg,#6366f1,#a855f7);
      color:white;border:none;cursor:pointer;
      padding:13px 28px;border-radius:999px;font-weight:600;
      font-family:'Inter',sans-serif;font-size:.9rem;
      box-shadow:0 0 24px rgba(99,102,241,.35);
      transition:all .25s ease;
    }
    .retry-btn:hover{transform:translateY(-2px);box-shadow:0 0 36px rgba(99,102,241,.55);}
    .status-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:rgba(6,7,20,.8);backdrop-filter:blur(12px);
      border-top:1px solid rgba(255,255,255,.07);
      padding:8px 20px;display:flex;align-items:center;justify-content:space-between;
      font-size:.7rem;color:#64748b;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-ring"><i class="fa-solid fa-wifi-slash"></i></div>
    <h1>You're Offline</h1>
    <p>No internet connection detected. Some features are still available from your local cache.</p>

    <div class="chips">
      <div class="chip"><i class="fa-solid fa-circle-check"></i> View saved students</div>
      <div class="chip"><i class="fa-solid fa-circle-check"></i> Browse cached forms</div>
      <div class="chip"><i class="fa-solid fa-circle-xmark" style="color:#ef4444"></i> PDF generation</div>
      <div class="chip"><i class="fa-solid fa-circle-xmark" style="color:#ef4444"></i> Live sync</div>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">
      <i class="fa-solid fa-rotate-right"></i> Retry Connection
    </button>
  </div>

  <div class="status-bar">
    <span>⚡ Outing Portal — Woxsen University</span>
    <span>Offline Mode</span>
  </div>
</body>
</html>
